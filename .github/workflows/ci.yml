name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Treat new clippy lints in future toolchain releases as warnings, not
  # build-breaking errors, so a CI run going red is always something we
  # actually changed. The job below still uses `-D warnings` to enforce
  # the existing lint surface; `RUSTFLAGS` only governs the build itself.
  RUSTFLAGS: -D warnings

jobs:
  # --- Rust core: library + CLI + integration tests + clippy -----------
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Run every platform even if one fails, so we get a full picture
      # of which OSes broke when a change lands.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Caches ~/.cargo/registry, ~/.cargo/git, and ./target keyed on the
      # Cargo.lock(s) in the listed workspaces. Saves the bulk of every
      # rebuild — first CI run is slow, subsequent runs are cache hits.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mnemo

      - name: cargo test
        working-directory: mnemo
        run: cargo test

      - name: cargo clippy
        working-directory: mnemo
        run: cargo clippy --all-targets -- -D warnings

  # --- MSRV check: ensure the codebase still builds against the floor
  #     declared in Cargo.toml (`rust-version = "1.75"`). Linux-only to
  #     keep job count down; toolchain drift across platforms is rare and
  #     would surface on the stable matrix above first.
  msrv:
    name: msrv (rust 1.75, linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.75
        uses: dtolnay/rust-toolchain@1.75

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mnemo
          key: msrv-1.75

      - name: cargo build
        working-directory: mnemo
        run: cargo build --all-targets

      - name: cargo test (lib + integration only)
        working-directory: mnemo
        # Skip --all-targets so we don't have to compile every test on
        # MSRV; the integration tests are the real correctness check.
        run: cargo test --test integration --test cli_smoke

  # --- Python bindings: build via maturin + run mnemo-python test_mnemo
  python:
    name: python bindings (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mnemo-python

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install maturin
        run: pip install maturin

      # `maturin develop` would be more direct, but it requires an active
      # virtualenv to install into; `actions/setup-python` gives us a
      # system Python on PATH without a venv. Build the abi3 wheel and
      # `pip install` it instead — this matches the recipe maturin's own
      # error message recommends for CI environments.
      - name: Build wheel
        working-directory: mnemo-python
        run: maturin build --release --out target/wheels

      - name: Install wheel
        working-directory: mnemo-python
        run: pip install target/wheels/*.whl

      - name: Run Python tests
        working-directory: mnemo-python
        run: python test_mnemo.py
